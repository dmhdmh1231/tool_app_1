<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>对称极简 | 日历 + 时钟 + 季节周末倒计时</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: system-ui, 'Segoe UI', 'SF Pro Text', 'PingFang SC', Arial, sans-serif;
        }

        .side-panel {
            width: 240px;
            background: rgba(20, 20, 30, 0.75);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px 12px;
            z-index: 10;
            transition: all 0.2s ease;
        }

        .left-panel {
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .right-panel {
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        .calendar-date {
            text-align: center;
            color: #f0f0f0;
            width: 100%;
        }

        .calendar-year-month {
            font-size: 1.6rem;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 16px;
            background: rgba(255,255,255,0.1);
            display: inline-block;
            padding: 6px 16px;
            border-radius: 40px;
        }

        .calendar-day {
            font-size: 4.2rem;
            font-weight: 700;
            line-height: 1;
            margin: 20px 0;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            letter-spacing: 4px;
        }

        .calendar-weekday {
            font-size: 1.4rem;
            opacity: 0.9;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            display: inline-block;
        }

        .calendar-lunar {
            font-size: 1rem;
            color: #dddddd;
            background: rgba(0,0,0,0.4);
            padding: 6px 12px;
            border-radius: 24px;
            margin-top: 12px;
            display: inline-block;
        }

        .right-content {
            text-align: center;
            color: #f0f0f0;
            width: 100%;
        }

        .season-name {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 40px;
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 48px;
            display: inline-block;
            letter-spacing: 2px;
        }

        .weekend-box {
            background: rgba(0,0,0,0.4);
            border-radius: 32px;
            padding: 16px 12px;
            margin-top: 20px;
            width: 100%;
        }

        .weekend-label {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .weekend-number {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: 4px;
        }

        .weekend-unit {
            font-size: 1.2rem;
            font-weight: 500;
            margin-left: 4px;
        }

        .weekend-message {
            font-size: 1.3rem;
            font-weight: 500;
            padding: 10px 0;
        }

        .clock-container {
            flex: 1;
            position: relative;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas#clockCanvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: crisp-edges;
        }

        .hint {
            position: fixed;
            bottom: 12px;
            right: 20px;
            font-size: 11px;
            color: rgba(150, 150, 150, 0.5);
            background: transparent;
            pointer-events: none;
            font-family: monospace;
            z-index: 20;
        }

        @media (max-width: 860px) {
            .side-panel { width: 200px; }
            .calendar-day { font-size: 3rem; }
            .calendar-year-month { font-size: 1.2rem; }
            .season-name { font-size: 1.4rem; }
            .weekend-number { font-size: 2.5rem; }
            .weekend-label { font-size: 0.9rem; }
        }
        @media (max-width: 720px) {
            .side-panel { width: 170px; }
            .calendar-day { font-size: 2.4rem; }
            .season-name { font-size: 1.2rem; }
            .weekend-number { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <!-- 左侧日历 -->
    <div class="side-panel left-panel">
        <div class="calendar-date">
            <div class="calendar-year-month" id="yearMonth">2025年01月</div>
            <div class="calendar-day" id="dayNumber">01</div>
            <div class="calendar-weekday" id="weekday">星期四</div>
            <div class="calendar-lunar" id="lunarDate">农历腊月初一</div>
        </div>
    </div>

    <!-- 中间时钟 -->
    <div class="clock-container" onclick="toggleFullScreen()">
        <canvas id="clockCanvas"></canvas>
    </div>

    <!-- 右侧季节+周末 -->
    <div class="side-panel right-panel">
        <div class="right-content">
            <div class="season-name" id="seasonName">春季</div>
            <div class="weekend-box" id="weekendBox">
                <div class="weekend-message">加载中...</div>
            </div>
        </div>
    </div>
    

    <script>
        // ==================== 农历计算 ====================
        const lunarInfo = [
            0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,
            0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,
            0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,
            0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,
            0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,
            0x06ca0,0x0b550,0x15355,0x04da0,0x0a5b0,0x14573,0x052b0,0x0a9a8,0x0e950,0x06aa0,
            0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,
            0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b6a0,0x195a6,
            0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,
            0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x055c0,0x0ab60,0x096d5,0x092e0,
            0x0c960,0x0d954,0x0d4a0,0x0da50,0x07552,0x056a0,0x0abb7,0x025d0,0x092d0,0x0cab5,
            0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x052b0,0x0a930,
            0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530,
            0x05aa0,0x076a3,0x096d0,0x04bd7,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,
            0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0
        ];

        function getLunarYearInfo(year) { return lunarInfo[year - 1900]; }
        function getLeapMonth(year) { return getLunarYearInfo(year) & 0xf; }
        function getLunarMonthDays(year, month) {
            const info = getLunarYearInfo(year);
            const leap = getLeapMonth(year);
            if (month === leap) return (info & 0x10000) ? 30 : 29;
            let bit = 1 << (16 - month);
            if (month > leap && leap > 0) bit >>= 1;
            return (info & bit) ? 30 : 29;
        }
        function getLunarYearDays(year) {
            let sum = 0;
            const info = getLunarYearInfo(year);
            for (let i = 0x8000; i > 0x8; i >>= 1) sum += (info & i) ? 30 : 29;
            if (getLeapMonth(year)) sum += (info & 0x10000) ? 30 : 29;
            return sum;
        }
        function solarToLunar(year, month, day) {
            const baseDate = new Date(1900, 0, 31);
            const targetDate = new Date(year, month - 1, day);
            let offset = Math.floor((targetDate - baseDate) / 86400000);
            let lunarYear = 1900;
            let daysInYear = getLunarYearDays(lunarYear);
            while (offset >= daysInYear && lunarYear < 2100) {
                offset -= daysInYear;
                lunarYear++;
                daysInYear = getLunarYearDays(lunarYear);
            }
            let lunarMonth = 1;
            let isLeap = false;
            let leapMonth = getLeapMonth(lunarYear);
            while (lunarMonth <= 12) {
                let monthDays;
                if (leapMonth > 0 && lunarMonth === leapMonth + 1 && !isLeap) {
                    monthDays = getLunarMonthDays(lunarYear, leapMonth);
                    isLeap = true;
                    lunarMonth--;
                } else {
                    monthDays = getLunarMonthDays(lunarYear, lunarMonth);
                }
                if (offset < monthDays) break;
                offset -= monthDays;
                lunarMonth++;
                if (isLeap && lunarMonth === leapMonth + 1) isLeap = false;
            }
            return { lunarYear, lunarMonth, lunarDay: offset + 1, isLeap };
        }
        function getLunarMonthString(month, isLeap) {
            const m = ['正', '二', '三', '四', '五', '六', '七', '八', '九', '十', '冬', '腊'];
            return (isLeap ? '闰' : '') + m[month - 1] + '月';
        }
        function getLunarDayString(day) {
            const d = ['初一', '初二', '初三', '初四', '初五', '初六', '初七', '初八', '初九', '初十',
                       '十一', '十二', '十三', '十四', '十五', '十六', '十七', '十八', '十九', '二十',
                       '廿一', '廿二', '廿三', '廿四', '廿五', '廿六', '廿七', '廿八', '廿九', '三十'];
            return d[day - 1];
        }

        function updateCalendar() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const weekday = weekdays[now.getDay()];
            document.getElementById('yearMonth').innerText = `${year}年${String(month).padStart(2,'0')}月`;
            document.getElementById('dayNumber').innerText = String(day).padStart(2,'0');
            document.getElementById('weekday').innerText = weekday;
            const lunar = solarToLunar(year, month, day);
            const lunarMonthStr = getLunarMonthString(lunar.lunarMonth, lunar.isLeap);
            const lunarDayStr = getLunarDayString(lunar.lunarDay);
            document.getElementById('lunarDate').innerText = `农历 ${lunarMonthStr}${lunarDayStr}`;
        }

        // ==================== 季节 ====================
        function getSeason(month) {
            if (month >= 3 && month <= 5) return "🌸 春季";
            if (month >= 6 && month <= 8) return "🍉 夏季";
            if (month >= 9 && month <= 11) return "🍂 秋季";
            return "❄️ 冬季";
        }

        // ==================== 周末倒计时（换行大数字版） ====================
        function updateWeekendDisplay() {
            const now = new Date();
            const currentDay = now.getDay();
            const weekendBox = document.getElementById('weekendBox');
            if (currentDay === 0 || currentDay === 6) {
                weekendBox.innerHTML = `<div class="weekend-message">🎉 已经是周末了！</div>`;
                return;
            }
            let daysUntilSaturday = 6 - currentDay;
            if (daysUntilSaturday < 0) daysUntilSaturday = 0;
            weekendBox.innerHTML = `
                <div class="weekend-label">距离周末还有</div>
                <div class="weekend-number">${daysUntilSaturday}<span class="weekend-unit">天</span></div>
            `;
        }

        function updateRightPanel() {
            const now = new Date();
            const month = now.getMonth() + 1;
            const season = getSeason(month);
            document.getElementById('seasonName').innerText = season;
            updateWeekendDisplay();
        }

        // ==================== 时钟部分 ====================
        const canvasClock = document.getElementById('clockCanvas');
        const ctxClock = canvasClock.getContext('2d');
        let radius = 0;
        let periodText = "时段获取中...";

        function getPeriodOfDay(hours) {
            if (hours < 6) return "🌙 凌晨";
            if (hours < 11) return "☀️ 上午";
            if (hours < 13) return "🌞 中午";
            if (hours < 17) return "⛅ 下午";
            if (hours < 19) return "🌆 傍晚";
            if (hours < 22) return "🌃 夜晚";
            return "🌌 深夜";
        }

        function updatePeriod() {
            const now = new Date();
            periodText = getPeriodOfDay(now.getHours());
        }

        function resizeCanvas() {
            const container = document.querySelector('.clock-container');
            const w = container.clientWidth;
            const h = container.clientHeight;
            canvasClock.width = w;
            canvasClock.height = h;
            const minSide = Math.min(w, h);
            radius = minSide / 2 * 0.82;
            const maxRadius = Math.min(w, h) * 0.43;
            if (radius > maxRadius) radius = maxRadius;
            drawClock();
        }

        function drawHand(ctx, cx, cy, angle, length, lineWidth, color, withCap = true) {
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + Math.cos(angle) * length, cy + Math.sin(angle) * length);
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            if (withCap) ctx.lineCap = 'round';
            ctx.stroke();
        }

        function drawCenterDot(ctx, cx, cy, radiusDot, color) {
            ctx.beginPath();
            ctx.arc(cx, cy, radiusDot, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx, cy, radiusDot * 0.4, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffffcc';
            ctx.fill();
        }

        function drawTickMarks(ctx, cx, cy, radius) {
            for (let i = 0; i < 60; i++) {
                const angle = (i * Math.PI * 2) / 60;
                const isHourTick = (i % 5 === 0);
                const startRad = isHourTick ? radius - radius * 0.09 : radius - radius * 0.045;
                const xStart = cx + Math.cos(angle) * startRad;
                const yStart = cy + Math.sin(angle) * startRad;
                const xEnd = cx + Math.cos(angle) * radius;
                const yEnd = cy + Math.sin(angle) * radius;
                ctx.beginPath();
                ctx.moveTo(xStart, yStart);
                ctx.lineTo(xEnd, yEnd);
                ctx.strokeStyle = isHourTick ? '#BBBBBB' : '#444444';
                ctx.lineWidth = isHourTick ? 3 : 1.5;
                ctx.stroke();
            }
        }

        function drawNumbers(ctx, cx, cy, radius) {
            const fontSize = radius * 0.14;
            ctx.font = `500 ${fontSize}px "Segoe UI", "SF Pro Text", Arial, system-ui`;
            ctx.fillStyle = '#F0F0F0';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (let i = 1; i <= 12; i++) {
                const angle = (i - 3) * (Math.PI * 2 / 12);
                const distance = radius * 0.72;
                ctx.fillText(i.toString(), cx + Math.cos(angle) * distance, cy + Math.sin(angle) * distance);
            }
        }

        function drawPeriodOnly(ctx, cx, cy, radius) {
            const periodFontSize = radius * 0.085;
            ctx.font = `500 ${periodFontSize}px system-ui, "Segoe UI", Arial`;
            ctx.fillStyle = '#EEEEEE';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(periodText, cx, cy - radius * 0.48);
        }

        function drawOuterRing(ctx, cx, cy, radius) {
            ctx.beginPath();
            ctx.arc(cx, cy, radius + 4, 0, Math.PI * 2);
            ctx.strokeStyle = '#2a2a2a';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(cx, cy, radius - 2, 0, Math.PI * 2);
            ctx.strokeStyle = '#1f1f1f';
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        function drawClock() {
            if (!ctxClock || !canvasClock) return;
            const w = canvasClock.width, h = canvasClock.height;
            if (w === 0 || h === 0) return;
            ctxClock.clearRect(0, 0, w, h);
            ctxClock.fillStyle = '#000000';
            ctxClock.fillRect(0, 0, w, h);
            const cx = w / 2, cy = h / 2;
            if (radius <= 5) return;
            drawOuterRing(ctxClock, cx, cy, radius);
            drawTickMarks(ctxClock, cx, cy, radius);
            drawNumbers(ctxClock, cx, cy, radius);
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const ms = now.getMilliseconds();
            const hourAngle = ((hours % 12) + minutes / 60 + seconds / 3600) * (Math.PI * 2 / 12) - Math.PI / 2;
            const minuteAngle = (minutes + seconds / 60) * (Math.PI * 2 / 60) - Math.PI / 2;
            const secondAngle = (seconds + ms / 1000) * (Math.PI * 2 / 60) - Math.PI / 2;
            drawHand(ctxClock, cx, cy, hourAngle, radius * 0.52, radius * 0.045, '#F5F5F5', true);
            drawHand(ctxClock, cx, cy, minuteAngle, radius * 0.68, radius * 0.032, '#CCCCCC', true);
            drawHand(ctxClock, cx, cy, secondAngle, radius * 0.78, radius * 0.022, '#FF5555', true);
            const backAngle = secondAngle + Math.PI;
            drawHand(ctxClock, cx, cy, backAngle, radius * 0.12, radius * 0.018, '#FF5555', true);
            drawCenterDot(ctxClock, cx, cy, radius * 0.045, '#E34234');
            ctxClock.beginPath();
            ctxClock.arc(cx, cy, radius * 0.065, 0, Math.PI * 2);
            ctxClock.strokeStyle = '#AAAAAA';
            ctxClock.lineWidth = 1.8;
            ctxClock.stroke();
            drawPeriodOnly(ctxClock, cx, cy, radius);
        }

        function tickUpdate() {
            updatePeriod();
            drawClock();
            updateCalendar();
            updateRightPanel();
        }

        // ========== 全屏修改：整个页面全屏，保留左右功能 ==========
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => console.warn(e));
            } else {
                document.exitFullscreen().catch(e => console.warn(e));
            }
        }

        let resizeTimeout;
        function onWindowResize() {
            if (resizeTimeout) clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                resizeCanvas();
            }, 100);
        }

        window.addEventListener('resize', onWindowResize);
        window.addEventListener('load', () => {
        resizeCanvas();
  updateCalendar();
  updateRightPanel();
  setInterval(tickUpdate, 1000);
  tickUpdate();

  // 👇 在这里添加 Service Worker 注册
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      console.log('Service Worker 注册成功', reg);
    }).catch(err => {
      console.log('Service Worker 注册失败', err);
    });
  }
});
    </script>
</body>
</html>
